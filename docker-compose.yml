version: '3.8'

services:

  # ── ClickHouse Keeper (consensus / coordination) ──────────────────────────
  clickhouse-keeper:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-keeper
    volumes:
      - keeper_data:/var/lib/clickhouse
      - ./backend/keeper-config.xml:/etc/clickhouse-server/config.d/keeper.xml
    ports:
      - "9181:9181"
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── ClickHouse Node 1 (primary) ───────────────────────────────────────────
  clickhouse-01:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-01
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
    volumes:
      - ch01_data:/var/lib/clickhouse
      - ./backend/cluster-config.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./backend/macros-01.xml:/etc/clickhouse-server/config.d/macros.xml
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_USER: mlab
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-mlab_secure_2026}
      CLICKHOUSE_DB: energy_monitoring
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "mlab",
             "--password", "mlab_secure_2026", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── ClickHouse Node 2 (replica) ───────────────────────────────────────────
  clickhouse-02:
    image: clickhouse/clickhouse-server:latest
    container_name: clickhouse-02
    depends_on:
      clickhouse-keeper:
        condition: service_healthy
    volumes:
      - ch02_data:/var/lib/clickhouse
      - ./backend/cluster-config.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./backend/macros-02.xml:/etc/clickhouse-server/config.d/macros.xml
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "8124:8123"
      - "9001:9000"
    environment:
      CLICKHOUSE_USER: mlab
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-mlab_secure_2026}
      CLICKHOUSE_DB: energy_monitoring
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "mlab",
             "--password", "mlab_secure_2026", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: energy-backend
    ports:
      - "8000:8000"
    depends_on:
      clickhouse-01:
        condition: service_healthy
      clickhouse-02:
        condition: service_healthy
    environment:
      # Primary node — backend tries this first
      CLICKHOUSE_HOST: clickhouse-01
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_HTTP_PORT: 8123
      # Replica node — failover target
      CLICKHOUSE_REPLICA_HOST: clickhouse-02
      CLICKHOUSE_REPLICA_PORT: 9000
      CLICKHOUSE_REPLICA_HTTP_PORT: 8124
      CLICKHOUSE_USER: mlab
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-mlab_secure_2026}
      CLICKHOUSE_DB: energy_monitoring
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
    restart: unless-stopped

  # ── React Dashboard ────────────────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: energy-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:8000/api/v1
    # Note: REACT_APP_* vars are baked in at build time by Create React App
    # They point to localhost because the browser calls the API, not the container
    restart: unless-stopped

volumes:
  keeper_data:
  ch01_data:
  ch02_data:
